name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --production

      - name: Check syntax
        run: |
          node --check server.js
          node --check app.js
          node --check mixer.js
          node --check player.js
          node --check playlist.js
          node --check library.js
          node --check library-worker.js
          node --check mic-capture-worklet.js

  deploy:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e

            cd /opt/chilled_koala

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing dependencies..."
            npm install --production

            echo "==> Installing systemd service..."
            cp chilled-koala.service /etc/systemd/system/chilled-koala.service
            systemctl daemon-reload
            systemctl enable chilled-koala

            echo "==> Restarting service..."
            # Kill any bare node process that pre-dates the systemd service
            pkill -f 'node /opt/chilled_koala/server.js' || true
            sleep 1
            systemctl restart chilled-koala
            sleep 2

            echo "==> Status:"
            systemctl status chilled-koala --no-pager
