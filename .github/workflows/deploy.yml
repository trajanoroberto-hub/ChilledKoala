name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --production

      - name: Check syntax
        run: |
          node --check server.js
          node --check app.js
          node --check mixer.js
          node --check player.js
          node --check playlist.js
          node --check library.js
          node --check library-worker.js
          node --check mic-capture-worklet.js

  deploy:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -s -X POST ${{ secrets.VPS_DEPLOY_URL }}/api/deploy \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail --max-time 30
          echo "Deploy webhook accepted by VPS"
